name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. cli-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            linker: gcc
          - target: aarch64-unknown-linux-gnu
            linker: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        working-directory: cli
        run: |
          mkdir -p dist
          tar -czf "dist/mdc-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" mdc
          sha256sum "dist/mdc-${{ matrix.target }}.tar.gz" \
            > "dist/mdc-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdc-${{ matrix.target }}
          path: cli/dist/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: mdc CLI ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Automated `mdc` CLI release.

            ## Binaries
            - `mdc-x86_64-unknown-linux-gnu.tar.gz` — Linux x86_64
            - `mdc-aarch64-unknown-linux-gnu.tar.gz` — Linux arm64

            Each archive contains the `mdc` binary; a matching `.sha256` file is included for verification.
          files: dist/*
          draft: false
          prerelease: false
